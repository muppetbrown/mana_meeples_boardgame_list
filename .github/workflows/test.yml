name: Test & Lint

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          ADMIN_TOKEN: test_admin_token_for_ci
          CORS_ORIGINS: http://localhost:3000
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          cd backend
          pytest tests/ -v --tb=short \
            --cov=. --cov-report=xml --cov-report=term --cov-report=html \
            --cov-fail-under=50 \
            --junitxml=pytest-report.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage-html
          path: backend/htmlcov/
          retention-days: 7

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run frontend tests
        run: cd frontend && npm run test:ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          fail_ci_if_error: false

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python linting tools
        run: pip install flake8 black isort

      - name: flake8
        run: |
          cd backend
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: black
        run: cd backend && black --check --diff . || echo "Black formatting issues found (non-blocking)"

      - name: isort
        run: cd backend && isort --check-only --diff . || echo "isort issues found (non-blocking)"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: ESLint
        continue-on-error: true
        run: |
          cd frontend
          if [ -f ".eslintrc.js" ] || [ -f ".eslintrc.json" ] || [ -f "eslint.config.js" ]; then
            npm run lint
          else
            echo "ESLint not configured, skipping"
          fi

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config

      - name: Install backend dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && VITE_API_BASE=http://localhost:8000 npm run build

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          PYTHONPATH: ${{ github.workspace }}/backend
        run: cd backend && alembic upgrade head

      - name: Seed test data
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          PYTHONPATH: ${{ github.workspace }}/backend
        run: cd backend && python scripts/seed_e2e_data.py

      - name: Start backend server
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          ADMIN_TOKEN: test_admin_token_for_e2e
          CORS_ORIGINS: http://localhost:3000,http://localhost:5173
          PYTHONPATH: ${{ github.workspace }}/backend
          SESSION_SECRET: test-session-secret-for-ci
          DISABLE_RATE_LIMITING: "true"
        run: |
          cd backend
          uvicorn main:app --host 0.0.0.0 --port 8000 --log-level debug > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid

      - name: Serve frontend
        run: |
          cd frontend
          npx serve -s build -l 3000 &
          echo $! > /tmp/frontend.pid

      - name: Wait for servers
        run: |
          echo "Waiting for backend..."
          for i in {1..30}; do
            curl -s http://localhost:8000/api/health > /dev/null && echo "Backend ready!" && break
            echo "Attempt $i: not ready yet"; sleep 2
          done

          echo "Waiting for database..."
          for i in {1..30}; do
            curl -s http://localhost:8000/api/health/db | jq -e '.status == "healthy"' > /dev/null 2>&1 && echo "DB ready!" && break
            echo "Attempt $i: not ready yet"; sleep 2
          done

          echo "Waiting for connection pool..."
          sleep 5

          echo "Waiting for frontend..."
          for i in {1..30}; do
            curl -s http://localhost:3000 > /dev/null && echo "Frontend ready!" && break
            echo "Attempt $i: not ready yet"; sleep 2
          done

      - name: Check backend logs
        run: |
          echo "=== Backend Startup Logs ==="
          [ -f /tmp/backend.log ] && tail -50 /tmp/backend.log || echo "No log file"

      - name: Verify test data
        run: |
          GAME_COUNT=$(curl -s http://localhost:8000/api/public/games | jq -r '.total // 0')
          echo "Total games: $GAME_COUNT"
          if [ "$GAME_COUNT" -eq "0" ]; then
            echo "ERROR: No games seeded!"
            curl -s http://localhost:8000/api/public/games | jq '.'
            tail -100 /tmp/backend.log || true
            exit 1
          fi
          echo "✓ $GAME_COUNT games found"

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          BASE_URL: http://localhost:3000
        run: npx playwright test --project=chromium --reporter=html

      - name: Dump backend logs on failure
        if: failure()
        run: |
          echo "=== Full Backend Logs ==="
          [ -f /tmp/backend.log ] && tail -200 /tmp/backend.log || echo "No log file"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop servers
        if: always()
        run: |
          [ -f /tmp/backend.pid ] && kill $(cat /tmp/backend.pid) || true
          [ -f /tmp/frontend.pid ] && kill $(cat /tmp/frontend.pid) || true

  all-tests-passed:
    name: All Tests Passed
    needs: [backend-tests, frontend-tests, e2e-tests, lint]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.backend-tests.result }}" != "success" ]; then echo "Backend tests failed!"; exit 1; fi
          if [ "${{ needs.frontend-tests.result }}" != "success" ]; then echo "Frontend tests failed!"; exit 1; fi
          if [ "${{ needs.e2e-tests.result }}" != "success" ]; then echo "E2E tests failed!"; exit 1; fi
          if [ "${{ needs.lint.result }}" != "success" ]; then echo "Lint failed!"; exit 1; fi
          echo "All tests passed! ✅"
